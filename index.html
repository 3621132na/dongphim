<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Động Phim - Thế Giới Phim Miễn Phí</title>
    <meta name="description" id="meta-description" content="Xem phim mới nhất, chất lượng cao miễn phí.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-container">
        <h2 class="logo" onclick="goHome()">🎬 DONGPHIM</h2>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên phim...">
            <button onclick="changePage(1)">Tìm</button>
        </div>
        
        <div class="filters">
            <select id="typeFilter" onchange="changePage(1)">
                <option value="">Loại phim</option>
                <option value="danh-sach/phim-bo">Phim bộ</option>
                <option value="danh-sach/phim-le">Phim lẻ</option>
                <option value="danh-sach/hoat-hinh">Hoạt hình</option>
                <option value="danh-sach/tv-shows">TV Shows</option>
            </select>
            <select id="genreFilter" onchange="changePage(1)">
                <option value="">Thể loại</option>
            </select>
            <select id="countryFilter" onchange="changePage(1)">
                <option value="">Quốc gia</option>
            </select>
            <select id="yearFilter" onchange="changePage(1)">
                <option value="">Năm</option>
            </select>
        </div>
    </div>
</header>

<main class="container">
    <div id="content">
        <div class="loading">Đang tải phim vui lòng chờ...</div>
    </div>
    <div id="pagination" class="pagination"></div>
</main>

<footer>
    <p>&copy; 2026 Pewnoy | API by OPhim</p>
</footer>

<script src="script.js"></script>
</body>
</html>
